name: Deploy Showcase and Projects to Hostinger

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    name: Upload via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      # Deploy showcase/ content to root (public_html/)
      - name: Deploy showcase to root
        uses: carlosbuitragosan/ftp-deploy-action@master
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: showcase/
          server-dir: /
          exclude: |
            .eslintrc
            .eslintignore
            .prettierrc
            package.json
            package-lock.json

      # Deploy project1/ to public_html/project1/
      - name: Deploy project1
        uses: carlosbuitragosan/ftp-deploy-action@master
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: geographic-data-explorer/
          server-dir: geographic-data-explorer/

      # Deploy project2 to public_html/project2/
      - name: Deploy project2
        uses: carlosbuitragosan/ftp-deploy-action@master
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: company-directory/
          server-dir: company-directory/
          exclude: |
            .prettierrc
            .php-cs-fixer.php
            .php-cs-fixer.cache
